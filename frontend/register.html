<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Eventua Journeys</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet" />
</head>
<body class="bg-slate-900 flex items-center justify-center min-h-screen p-4">
    <div class="bg-white p-6 md:p-10 rounded-3xl shadow-2xl w-full max-w-md">
        <div class="text-center mb-10">
            <h1 class="text-2xl md:text-3xl font-bold text-gray-800 tracking-tight">Create Your Account</h1>
            <p class="text-gray-500 text-sm md:text-base">Join and start planning your dream trips</p>
        </div>
        <form id="registerForm" class="space-y-6">
            <div>
                <label class="block text-sm font-semibold text-gray-700">Full Name</label>
                <input id="name" type="text" class="w-full mt-2 p-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-teal-500 outline-none transition" placeholder="Alex Doe" required>
            </div>
            <div>
                <label class="block text-sm font-semibold text-gray-700">Email Address</label>
                <input id="email" type="email" class="w-full mt-2 p-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-teal-500 outline-none transition" placeholder="alex@example.com" required>
            </div>
            <div>
                <label class="block text-sm font-semibold text-gray-700">Password</label>
                <input id="password" type="password" class="w-full mt-2 p-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-teal-500 outline-none transition" placeholder="••••••••" required>
            </div>
            <button type="submit" class="w-full bg-teal-600 text-white p-3 md:p-4 rounded-xl font-bold hover:bg-teal-700 transition shadow-lg shadow-teal-200/50">Create Account</button>
        </form>
        <p class="mt-8 text-center text-gray-600 text-sm">Already have an account? <a href="login.html" class="text-teal-600 font-bold hover:underline">Sign in</a></p>
    </div>
    <script src="js/auth.js"></script>
</body>
</html>
