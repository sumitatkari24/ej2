<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trips | Eventua Journeys</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="css/style.css" />
</head>
<body class="bg-gray-100">
    <aside class="hidden md:flex w-64 bg-white h-screen border-r border-gray-200 flex-col fixed shadow-sm">
        <div class="p-8 text-2xl font-bold text-teal-600 tracking-tighter">EVENTUA JOURNEYS</div>
        <nav class="flex-1 px-6 space-y-2">
            <a href="dashboard.html" class="flex items-center space-x-3 p-3 text-gray-500 hover:bg-gray-50 rounded-xl transition"><i data-lucide="layout-dashboard"></i> <span class="hidden lg:inline">Dashboard</span></a>
            <a href="trips.html" class="flex items-center space-x-3 p-3 bg-teal-50 text-teal-700 rounded-xl font-medium"><i data-lucide="map"></i> <span class="hidden lg:inline">My Trips</span></a>
            <a href="booking.html" class="flex items-center space-x-3 p-3 text-gray-500 hover:bg-gray-50 rounded-xl transition"><i data-lucide="plus-circle"></i> <span class="hidden lg:inline">Plan New</span></a>
        </nav>
        <div class="p-6 border-t border-gray-100">
            <a href="#" id="logoutSidebar" class="flex items-center space-x-3 text-red-500 font-medium"><i data-lucide="log-out"></i> <span class="hidden lg:inline">Logout</span></a>
        </div>
    </aside>

    <!-- Mobile Top Nav -->
    <nav class="md:hidden fixed top-0 left-0 right-0 z-40 bg-white border-b border-gray-200 p-4 flex items-center justify-between">
        <div class="text-lg font-bold text-teal-600">EVENTUA JOURNEYS</div>
        <div class="space-x-2 text-sm">
            <a href="dashboard.html" class="text-slate-600 hover:text-teal-500">Dashboard</a>
            <a href="booking.html" class="text-teal-600 font-semibold">Plan</a>
            <a href="#" id="logoutMobile" class="text-red-500 font-semibold">Logout</a>
        </div>
    </nav>

    <main class="ml-0 md:ml-64 flex-1 p-3 md:p-10 pt-24 md:pt-10">
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 md:mb-10 gap-4">
            <div>
                <h2 class="text-2xl md:text-3xl font-bold text-gray-800">Trips for You</h2>
                <p class="text-gray-500 text-sm md:text-base">Book your next adventure and keep your itinerary updated.</p>
            </div>
            <div class="flex flex-col sm:flex-row items-start sm:items-center gap-2 sm:gap-3 w-full sm:w-auto">
                <button id="goBookingPage" class="px-4 md:px-5 py-2 rounded-xl bg-teal-600 text-white hover:bg-teal-700 text-sm md:text-base w-full sm:w-auto">Plan New Trip</button>
                <button id="refreshTrips" class="px-4 md:px-5 py-2 rounded-xl bg-gray-50 text-gray-700 border border-gray-200 hover:bg-gray-100 text-sm md:text-base w-full sm:w-auto">Refresh</button>
            </div>
        </header>

        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3 md:gap-6" id="trips"></div>
    </main>

    <script src="js/trips.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
