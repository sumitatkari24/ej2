<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Eventura Journeys | Premium Trip Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="css/style.css" />
    <style>
        body { font-family: 'Inter', sans-serif; }
        .hero-font { font-family: 'Playfair Display', serif; }
        .glass { background: rgba(255, 255, 255, 0.12); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.25); }
        .trip-card:hover { transform: translateY(-6px); }
    </style>
</head>
<body class="bg-gradient-to-b from-slate-100 to-sky-50 min-h-screen">
    <!-- Navbar -->
    <nav class="fixed w-full z-40 glass py-4 px-4 md:px-8 flex justify-between items-center text-white shadow-lg">
        <h1 class="text-xl md:text-2xl font-bold tracking-tighter uppercase hero-font">Eventura Journeys</h1>
        
        <!-- Mobile Menu Button -->
        <button id="mobileMenuBtn" class="md:hidden text-white text-2xl">☰</button>
        
        <!-- Desktop Menu -->
        <div id="navMenu" class="hidden md:flex space-x-3 md:space-x-6 font-medium text-xs md:text-sm lg:text-base">
            <a href="index.html" class="hover:text-teal-300 transition">Home</a>
            <a href="trips.html" class="hover:text-teal-300 transition">Explore</a>
            <a id="navDashboard" href="dashboard.html" class="hidden hover:text-teal-300 transition">Dashboard</a>
            <a id="navLogin" href="login.html" class="hover:text-teal-300 transition">Login</a>
            <a id="navRegister" href="register.html" class="bg-teal-500 px-3 md:px-4 py-1 md:py-2 rounded-full hover:bg-teal-600 transition shadow-lg text-xs md:text-sm">Sign Up</a>
            <button id="navLogout" class="hidden bg-red-500 px-3 md:px-4 py-1 md:py-2 rounded-full hover:bg-red-600 transition shadow-lg text-xs md:text-sm">Logout</button>
        </div>
        
        <!-- Mobile Menu (dropdown) -->
        <div id="mobileMenu" class="hidden absolute top-16 left-0 right-0 bg-slate-900/95 backdrop-blur flex flex-col space-y-3 p-4 md:hidden">
            <a href="index.html" class="hover:text-teal-300 transition">Home</a>
            <a href="trips.html" class="hover:text-teal-300 transition">Explore</a>
            <a id="mobDashboard" href="dashboard.html" class="hidden hover:text-teal-300 transition">Dashboard</a>
            <a id="mobLogin" href="login.html" class="hover:text-teal-300 transition">Login</a>
            <a id="mobRegister" href="register.html" class="bg-teal-500 px-4 py-2 rounded-full hover:bg-teal-600 transition shadow-lg inline-block w-fit">Sign Up</a>
            <button id="mobLogout" class="hidden bg-red-500 px-4 py-2 rounded-full hover:bg-red-600 transition shadow-lg w-fit">Logout</button>
        </div>
    </nav>

    <script>
        const mobileMenuBtn = document.getElementById('mobileMenuBtn');
        const mobileMenu = document.getElementById('mobileMenu');
        
        mobileMenuBtn?.addEventListener('click', () => {
            mobileMenu.classList.toggle('hidden');
        });

        // Check if user is logged in and update navbar
        document.addEventListener('DOMContentLoaded', () => {
            const token = localStorage.getItem('token');
            
            if (token) {
                // Hide login/register, show dashboard/logout
                document.getElementById('navLogin').classList.add('hidden');
                document.getElementById('navRegister').classList.add('hidden');
                document.getElementById('navDashboard').classList.remove('hidden');
                document.getElementById('navLogout').classList.remove('hidden');
                
                document.getElementById('mobLogin').classList.add('hidden');
                document.getElementById('mobRegister').classList.add('hidden');
                document.getElementById('mobDashboard').classList.remove('hidden');
                document.getElementById('mobLogout').classList.remove('hidden');
                
                // Add logout listeners
                document.getElementById('navLogout').addEventListener('click', logout);
                document.getElementById('mobLogout').addEventListener('click', logout);
            }
        });

        function logout(e) {
            e.preventDefault();
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = 'index.html';
        }
    </script>

    <!-- Hero Section -->
    <section class="relative min-h-[80vh] flex items-center justify-center overflow-hidden pt-24">
        <img src="https://images.unsplash.com/photo-1469854523086-cc02fe5d8800?w=1920&h=1080&fit=crop&q=80" 
             class="absolute w-full h-full object-cover" 
             alt="Hero" 
             onerror="this.src='https://images.unsplash.com/photo-1488646953014-85cb44e25828?w=1920&h=1080&fit=crop&q=80'" 
             loading="eager" />
        <div class="absolute inset-0 bg-slate-900/55"></div>
        <div class="relative z-20 text-center text-white px-4 max-w-6xl">
            <h2 class="text-4xl sm:text-5xl md:text-6xl hero-font mb-4 leading-tight">Explore the Unseen.</h2>
            <p class="text-base sm:text-lg md:text-xl mb-8 font-light max-w-3xl mx-auto">Manage your journeys with the world’s most sophisticated trip management platform.</p>
            <div class="bg-white/95 p-4 md:p-5 rounded-xl shadow-2xl flex flex-col sm:flex-row gap-3 max-w-4xl mx-auto text-slate-800 border border-slate-200">
                <input id="searchInput" type="text" placeholder="Where to?" class="flex-1 p-3 border border-gray-200 rounded-lg focus:outline-none focus:border-teal-500" />
                <input type="date" class="flex-1 p-3 border border-gray-200 rounded-lg focus:outline-none focus:border-teal-500" />
                <button id="planTripBtn" class="w-full sm:w-auto bg-teal-500 text-white px-6 py-3 rounded-lg font-semibold hover:bg-teal-600 transition">Plan Trip</button>
            </div>
        </div>
    </section>

    <!-- Trips Dashboard -->
    <main class="container mx-auto px-4 py-12 mt-8">
        <div class="text-center mb-8">
            <h3 class="text-2xl sm:text-3xl font-bold text-slate-800">Popular Collection</h3>
            <p class="text-slate-500 mt-2">Browse top destinations curated just for you.</p>
        </div>

        <div id="trips" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6"></div>
    </main>

    <script src="js/imageLoader.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
