<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Eventua Journeys | Booking</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="css/style.css" />
</head>
<body class="bg-slate-100 text-slate-900 min-h-screen">
    <nav class="fixed w-full z-40 bg-white/70 backdrop-blur border-b border-slate-200">
        <div class="max-w-6xl mx-auto flex items-center justify-between p-3 md:p-5">
            <a href="index.html" class="text-lg md:text-2xl font-bold hero-font">Eventua Journeys</a>
            <div class="space-x-2 md:space-x-5 text-xs md:text-base">
                <a href="index.html" class="hidden md:inline hover:text-teal-500 transition">Home</a>
                <a href="trips.html" class="hidden md:inline hover:text-teal-500 transition">Explore</a>
                <a href="dashboard.html" class="hover:text-teal-500 transition">Dashboard</a>
                <a href="#" id="logout" class="px-3 md:px-4 py-1 md:py-2 bg-teal-500 text-white rounded-full hover:bg-teal-600 transition text-xs md:text-sm">Logout</a>
            </div>
        </div>
    </nav>

    <main class="pt-24 pb-16">
        <div class="max-w-5xl mx-auto px-4">
            <div class="max-w-4xl mx-auto bg-white p-5 md:p-10 rounded-3xl shadow-xl border border-gray-100">
                <h3 class="text-2xl md:text-3xl font-bold mb-6 md:mb-8 flex items-center gap-2 md:gap-3"><span class="text-teal-600 text-2xl md:text-3xl">&#x1F4CD;</span> Plan Your New Journey</h3>
                <form id="bookingForm" class="grid grid-cols-1 md:grid-cols-2 gap-4 md:gap-8">
                    <div class="md:col-span-2">
                        <label class="block text-xs md:text-sm font-bold text-gray-700 mb-2">Trip ID <span class="text-xs text-gray-400">(enter existing trip ID from Explore)</span></label>
                        <input id="tripId" name="tripId" type="text" placeholder="Trip ID" class="w-full p-3 md:p-4 bg-gray-50 border border-gray-100 rounded-2xl outline-none focus:ring-2 focus:ring-teal-500" required>
                    </div>
                    <div class="md:col-span-2">
                        <label class="block text-xs md:text-sm font-bold text-gray-700 mb-2">Trip Title</label>
                        <input name="title" type="text" placeholder="e.g. Summer in Italy" class="w-full p-3 md:p-4 bg-gray-50 border border-gray-100 rounded-2xl outline-none focus:ring-2 focus:ring-teal-500" required>
                    </div>
                    <div>
                        <label class="block text-xs md:text-sm font-bold text-gray-700 mb-2">Destination</label>
                        <select name="destination" class="w-full p-3 md:p-4 bg-gray-50 border border-gray-100 rounded-2xl outline-none focus:ring-2 focus:ring-teal-500" required>
                            <option value="">Select Country</option>
                            <option value="France">France</option>
                            <option value="Japan">Japan</option>
                            <option value="USA">USA</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs md:text-sm font-bold text-gray-700 mb-2">Travel Date</label>
                        <input name="date" type="date" class="w-full p-3 md:p-4 bg-gray-50 border border-gray-100 rounded-2xl outline-none focus:ring-2 focus:ring-teal-500" required>
                    </div>
                    <div>
                        <label class="block text-xs md:text-sm font-bold text-gray-700 mb-2">Estimated Budget ($)</label>
                        <input name="budget" type="number" placeholder="2500" class="w-full p-3 md:p-4 bg-gray-50 border border-gray-100 rounded-2xl outline-none focus:ring-2 focus:ring-teal-500" required>
                    </div>
                    <div>
                        <label class="block text-xs md:text-sm font-bold text-gray-700 mb-2">Number of Travelers</label>
                        <input name="travelers" type="number" value="1" min="1" class="w-full p-3 md:p-4 bg-gray-50 border border-gray-100 rounded-2xl outline-none focus:ring-2 focus:ring-teal-500" required>
                    </div>
                    <div class="md:col-span-2 pt-4 md:pt-6">
                        <button type="submit" class="w-full bg-teal-600 text-white p-4 md:p-5 rounded-2xl font-bold hover:bg-teal-700 transition shadow-lg shadow-teal-100 text-sm md:text-base">Create Trip Itinerary and Book</button>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <script src="js/booking.js"></script>
</body>
</html>
