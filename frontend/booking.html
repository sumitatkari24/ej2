<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Eventua Journeys | Booking</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="css/style.css" />
</head>
<body class="bg-slate-100 text-slate-900 min-h-screen">
    <nav class="fixed w-full z-40 bg-white/70 backdrop-blur border-b border-slate-200">
        <div class="max-w-6xl mx-auto flex items-center justify-between p-3 md:p-5">
            <a href="index.html" class="text-lg md:text-2xl font-bold hero-font">Eventua Journeys</a>
            <div class="space-x-2 md:space-x-5 text-xs md:text-base">
                <a href="index.html" class="hidden md:inline hover:text-teal-500 transition">Home</a>
                <a href="trips.html" class="hidden md:inline hover:text-teal-500 transition">Explore</a>
                <a href="dashboard.html" class="hover:text-teal-500 transition">Dashboard</a>
                <a href="#" id="logout" class="px-3 md:px-4 py-1 md:py-2 bg-teal-500 text-white rounded-full hover:bg-teal-600 transition text-xs md:text-sm">Logout</a>
            </div>
        </div>
    </nav>

    <main class="pt-24 pb-16">
        <div class="max-w-5xl mx-auto px-4">
            <div class="max-w-4xl mx-auto bg-white p-5 md:p-10 rounded-3xl shadow-xl border border-gray-100">
                <h3 class="text-2xl md:text-3xl font-bold mb-6 md:mb-8 flex items-center gap-2 md:gap-3"><span class="text-teal-600 text-2xl md:text-3xl">&#x1F4CD;</span> Plan Your New Journey</h3>
                
                <!-- Step 1: Trip Selection -->
                <div id="step1" class="block">
                    <form id="bookingForm" class="grid grid-cols-1 md:grid-cols-2 gap-4 md:gap-8">
                        <div class="md:col-span-2">
                            <label class="block text-xs md:text-sm font-bold text-gray-700 mb-2">Select a Trip</label>
                            <select id="tripSelect" name="tripId" class="w-full p-3 md:p-4 bg-gray-50 border border-gray-100 rounded-2xl outline-none focus:ring-2 focus:ring-teal-500" required>
                                <option value="">Loading trips...</option>
                            </select>
                        </div>
                        <div id="tripDetailsPanel" class="hidden md:col-span-2 bg-teal-50 p-4 rounded-2xl border border-teal-200">
                            <h4 class="font-bold text-gray-800 mb-3">Trip Details</h4>
                            <div id="tripDetails" class="space-y-2 text-sm text-gray-700"></div>
                        </div>
                        <div class="md:col-span-2 pt-4 md:pt-6">
                            <button type="button" id="proceedToDate" class="w-full bg-teal-600 text-white p-4 md:p-5 rounded-2xl font-bold hover:bg-teal-700 transition shadow-lg shadow-teal-100 text-sm md:text-base">Select Travel Date</button>
                        </div>
                    </form>
                </div>

                <!-- Step 2: Date Selection -->
                <div id="step-date" class="hidden">
                    <form id="dateForm" class="grid grid-cols-1 md:grid-cols-2 gap-4 md:gap-8">
                        <div class="md:col-span-2 bg-teal-50 p-4 rounded-2xl border border-teal-200 mb-4">
                            <h4 class="font-bold text-gray-800 mb-3">Trip Details</h4>
                            <div id="dateStepTripDetails" class="space-y-2 text-sm text-gray-700"></div>
                        </div>
                        <div class="md:col-span-2">
                            <label class="block text-xs md:text-sm font-bold text-gray-700 mb-2">Pickup Date</label>
                            <input type="date" id="pickupDate" class="w-full p-3 md:p-4 bg-gray-50 border border-gray-100 rounded-2xl outline-none focus:ring-2 focus:ring-teal-500" required>
                            <p class="text-xs text-gray-500 mt-2">Select the date for pickup</p>
                        </div>
                        <div class="md:col-span-2">
                            <label class="block text-xs md:text-sm font-bold text-gray-700 mb-2">Travel Date (To)</label>
                            <input type="date" id="travelDate" class="w-full p-3 md:p-4 bg-gray-50 border border-gray-100 rounded-2xl outline-none focus:ring-2 focus:ring-teal-500" required>
                            <p class="text-xs text-gray-500 mt-2">Select the date you want to end your journey</p>
                        </div>
                        <div class="md:col-span-2 pt-4 md:pt-6 flex gap-3">
                            <button type="button" id="backToTrip" class="flex-1 bg-gray-300 text-gray-800 p-4 md:p-5 rounded-2xl font-bold hover:bg-gray-400 transition text-sm md:text-base">Back</button>
                            <button type="button" id="proceedToPayment" class="flex-1 bg-teal-600 text-white p-4 md:p-5 rounded-2xl font-bold hover:bg-teal-700 transition shadow-lg shadow-teal-100 text-sm md:text-base">Proceed to Payment</button>
                        </div>
                    </form>
                </div>

                <!-- Step 3: Payment Form -->
                <div id="step2" class="hidden">
                    <div class="mb-6 p-4 bg-teal-50 rounded-2xl border border-teal-200">
                        <h4 class="font-bold text-gray-800 mb-3">Booking Summary</h4>
                        <div id="paymentSummary" class="space-y-2 text-sm"></div>
                    </div>

                    <form id="paymentForm" class="grid grid-cols-1 md:grid-cols-2 gap-4 md:gap-8">
                        <div class="md:col-span-2">
                            <label class="block text-xs md:text-sm font-bold text-gray-700 mb-2">Payment Method</label>
                            <div class="space-y-2">
                                <label class="flex items-center p-3 border border-gray-200 rounded-xl cursor-pointer hover:bg-gray-50">
                                    <input type="radio" name="paymentMethod" value="cash" checked class="w-4 h-4 text-teal-600">
                                    <span class="ml-3 text-sm font-medium text-gray-700">💵 Cash Payment</span>
                                </label>
                            </div>
                        </div>

                        <div class="md:col-span-2 p-4 bg-teal-50 rounded-xl border border-teal-200">
                            <p class="text-sm text-gray-700">💳 Payment will be collected at the time of pickup.</p>
                        </div>

                        <div class="md:col-span-2 pt-4 md:pt-6 flex gap-3">
                            <button type="button" id="backToTrip" class="flex-1 bg-gray-300 text-gray-800 p-4 md:p-5 rounded-2xl font-bold hover:bg-gray-400 transition text-sm md:text-base">Back</button>
                            <button type="submit" id="completePayment" class="flex-1 bg-teal-600 text-white p-4 md:p-5 rounded-2xl font-bold hover:bg-teal-700 transition shadow-lg shadow-teal-100 text-sm md:text-base">Complete Payment</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <script src="js/imageLoader.js"></script>
    <script src="js/booking.js"></script>
</body>
</html>
